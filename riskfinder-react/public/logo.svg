<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64">
  <defs>
    <linearGradient id="rfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#1E5AA8"/>
    </linearGradient>
    <linearGradient id="rfAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C49A"/>
      <stop offset="100%" stop-color="#00A8E8"/>
    </linearGradient>
  </defs>

  <!-- Mark : shield + radar/scan -->
  <g transform="translate(8,8)">
    <!-- Shield silhouette (security / banking) -->
    <path d="M24 0 L46 8 V26 C46 38 36 46 24 48 C12 46 2 38 2 26 V8 Z"
          fill="url(#rfGrad)"/>
    <!-- Inner shield border -->
    <path d="M24 4 L42 10.5 V25.5 C42 35.5 33.5 42.5 24 44 C14.5 42.5 6 35.5 6 25.5 V10.5 Z"
          fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Radar arcs (risk scanning) -->
    <circle cx="24" cy="24" r="5"  fill="none" stroke="url(#rfAccent)" stroke-width="1.6"/>
    <circle cx="24" cy="24" r="10" fill="none" stroke="url(#rfAccent)" stroke-width="1.2" opacity="0.7"/>
    <circle cx="24" cy="24" r="15" fill="none" stroke="url(#rfAccent)" stroke-width="0.8" opacity="0.4"/>
    <!-- Center dot (target / finder) -->
    <circle cx="24" cy="24" r="2" fill="#00C49A"/>
    <!-- Scan line -->
    <line x1="24" y1="24" x2="36" y2="14" stroke="#00C49A" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(68,0)" font-family="Georgia, 'Times New Roman', serif">
    <text x="0" y="32" font-size="22" font-weight="700" fill="#0A2540" letter-spacing="0.5">Risk</text>
    <text x="50" y="32" font-size="22" font-weight="400" fill="#1E5AA8" letter-spacing="0.5">Finder</text>
    <text x="0" y="48" font-size="8" font-weight="600" fill="#5B6B7F" letter-spacing="3" font-family="Helvetica, Arial, sans-serif">CREDIT&#160;RISK&#160;INTELLIGENCE</text>
  </g>
</svg>
